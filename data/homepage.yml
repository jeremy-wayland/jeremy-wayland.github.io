# about

about:
  enable: false
  title: "More about me!"
  content: "I'm born and raised in California ☀️ I love to surf, ski, snowboard and and generally enjoy the outdoors. Now that I live in Munich, I've transitioned to slightly different hobbies like hiking, biking, and spikeball. Although one can indeed surf in Munich, I haven't yet found a true fix for being in the ocean 🌊 So most of my non-work travels are to the coast, looking for waves and enjoying the sun 🏄‍♂️ I also like to play and listen to music! I've been playing the cello for 15 years and although I had to leave my instrument at home in the states, I'm hoping to get one soon here in Munich🎶 In the meantime, I tide myself over by messing around on the piano and guitar, and learning German 🇩🇪If you're in the Munich area and want to jam, throw a frisbee, play soccer, spikeball, or just want to grab a beer, hit me up! I'll have a gallery of fun pictures coming soon, so stay tuned! 📸"
