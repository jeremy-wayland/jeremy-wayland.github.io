# Project
testimonial:
  enable: true
  title: "Publications"
  items:
    - name: "Strategies to accelerate US coal power phase-out using contextual retirement vulnerabilities"
      position: "<em>Nature Energy 2025</em>"
      featured: true
      badge: "Application Paper"
      content: "We combine graph methods and topological analysis to cluster the US coal fleet into retirement archetypes. The resulting vulnerability scores identify group-specific levers, helping policymakers prioritize targeted pathways for faster coal phase-out."
      image:
        x: "images/publications/coal-abstract.svg"
        _2x: "images/publications/coal-abstract.svg"
      github: "https://github.com/Krv-Analytics/Thema"
      google_scholar: "https://www.nature.com/articles/s41560-025-01871-0"

    - name: "No Metric to Rule Them All: Toward Principled Evaluations of Graph-Learning Datasets"
      position: "<em>ICML 2025</em>"
      badge: "ML Conference"
      content: "We introduce RINGS, a mode-perturbation framework to assess graph-learning dataset quality. Using performance separability and mode complementarity metrics, we provide principled tools for evaluating how well datasets benchmark graph-learning methods."
      image:
        x: "images/publications/rings-abstract.svg"
        _2x: "images/publications/rings-abstract.svg"
      github: "https://github.com/aidos-lab/rings"
      google_scholar: "https://arxiv.org/abs/2502.02379"

    - name: "Characterizing Physician Referral Networks with Ricci Curvature"
      position: "<em>IPLDSC 2024</em>"
      badge: "Application Paper"
      content: "We use Forman-Ricci and Ollivier-Ricci curvature to analyze physician referral networks and detect regional variation in care delivery. This work introduces 'apparent', an open-source pipeline linking network geometry to local demographics and outcomes."
      image:
        x: "images/publications/referral-curvature-abstract.svg"
        _2x: "images/publications/referral-curvature-abstract.svg"
      github: "https://github.com/aidos-lab/apparent"
      google_scholar: "https://arxiv.org/abs/2408.16022"

    - name: "Mapping the Multiverse of Latent Representations"
      position: "<em>ICML 2024</em>"
      badge: "ML Conference"
      content: "We present PRESTO, a framework using persistent homology to map the multiverse of latent representations. It enables sensitivity analysis, anomaly detection, and efficient hyperparameter navigation by characterizing embedding variability across ML models."
      image:
        x: "images/publications/presto-abstract.svg"
        _2x: "images/publications/presto-abstract.svg"
      github: "https://github.com/aidos-lab/Presto"
      google_scholar: "https://arxiv.org/abs/2402.01514"

    - name: "Curvature Filtrations for Graph Generative Model Evaluation"
      position: "<em>NeurIPS 2023</em>"
      badge: "ML Conference"
      content: "A topological descriptor for graph distributions using curvature filtrations. Our method enables scalable statistical comparisons and hypothesis testing for evaluating graph generative models, with applications to drug development."
      image:
        x: "images/publications/curvature-filtration-abstract.svg"
        _2x: "images/publications/curvature-filtration-abstract.svg"
      github: "https://github.com/aidos-lab/CFGGME"
      google_scholar: "https://arxiv.org/abs/2301.12906"

    - name: "Expressivity of Ollivier-Ricci Curvature"
      position: "<em>ICML 2023 TAGML Workshop </em>"
      badge: "Workshop Paper"
      content: "We study the representational power of Ollivier-Ricci curvature for distinguishing non-isomorphic graphs. The paper clarifies when curvature captures meaningful structural signals for downstream graph learning."
      image:
        x: "images/publications/ollivier-ricci-abstract.svg"
        _2x: "images/publications/ollivier-ricci-abstract.svg"
      github: "https://github.com/aidos-lab/CFGGME"
      google_scholar: "https://openreview.net/pdf?id=F1fuuUYui1"

