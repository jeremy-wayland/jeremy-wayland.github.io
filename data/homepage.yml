# experience
experience:
  enable: true
  title: "Experience"
  description: "I started as an undergrad in mathematics and physics at <a target='_blank' href='https://www.berkeley.edu/'>UC Berkeley</a>, then completed a masters in data science at <a target='_blank' href='https://www.chapman.edu/'>Chapman University</a>. Along the way, I gained industry experience as an ML consultant at <a target='_blank' href='https://www.madiba.com/'>Madiba</a> and as a research developer at <a target='_blank' href='https://www.encryptek.net/'>Encryptek</a>. <br/><br/> These experiences led me to CHOC as a grant-funded Research Scientist, where I worked with <a target='_blank' href='https://scholar.google.com/citations?user=xu4laD8AAAAJ&hl=en'>Louis Ehwerhemuepha</a> on predictive models for pediatric sepsis—and discovered my passion for computational topology. I then joined <a target='_blank' href='https://bastian.rieck.me/'>Bastian Rieck's</a> <a target='_blank' href='https://aidos.group/'>AIDOS Lab</a> at the University of Fribourg to pursue a PhD in topological and geometric deep learning. <br/><br/> In 2023, I co-founded <a target='_blank' href='https://krv.ai/'>Krv Labs</a> with <a target='_blank' href='https://stuartwayland.github.io/'>Stuart Wayland</a> and <a target='_blank' href='https://www.linkedin.com/in/sidney-gathrid/'>Sidney Gathrid</a>. Our first project together used discrete Riemannian curvature for graphs—hence the name 'Krv'. That work is now published in <a target='_blank' href='https://www.nature.com/articles/s41560-025-01871-0'>Nature Energy</a>. Today, Krv builds clinical trial platforms for AI models, helping teams find failure modes and ship with evidence."
  
