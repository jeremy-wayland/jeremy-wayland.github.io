  title: "Hi, I'm Jeremy."
  subtitle: "Researcher | Founder"
  description: "My dream is to use my background in mathematics and software development skills to design sophisticated tools that can <em>improve data-driven healthcare and help facilitate the urgent action needed to combat climate change</em>. <br/><br/> I'm completing my PhD at the <a target='_blank' href='https://www.cit.tum.de/en/cit/home/'>Technical University of Munich</a>, researching topological and geometric deep learning as a member of the <a target='_blank' href='https://aidos.group/'>AIDOS Lab</a> at the University of Fribourg. I'm also a co-founder of <a target='_blank' href='https://krv.ai/'>Krv Labs</a>, where we build clinical trial platforms for AI models—finding failure modes, fixing what breaks, and shipping with evidence. <br/><br/> Always looking for new opportunities to collaborate and exchange ideas—feel free to reach out!"
